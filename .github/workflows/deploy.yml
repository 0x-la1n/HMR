name: Deploy HMR Locally

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # La magia ocurre aquí: le decimos que use la máquina donde instalaste el agente
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy Docker Containers
      run: |
        # Ya estamos dentro del servidor, así que ejecutamos Docker directamente
        docker compose up -d --build
        docker image prune -f